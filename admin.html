<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — BarangayConnect</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="stylesheet" href="css/main.css" />
  <style>

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    /* =====================================================
       TOP NAV
    ===================================================== */
    .admin-topnav {
      background: linear-gradient(135deg, #8b1a1a 0%, #b91c1c 50%, #991b1b 100%);
      padding: 0 2rem;
      position: relative;
      overflow: hidden;
    }

    .admin-topnav::before {
      content: '';
      position: absolute;
      bottom: -30px; left: 0; right: 0;
      height: 60px;
      background: #f4f6f9;
      border-radius: 50% 50% 0 0 / 20px 20px 0 0;
    }

    .admin-topnav__inner {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-top: 1rem;
      position: relative;
      z-index: 1;
    }

    .admin-tab {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.1rem;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.8);
      transition: background 0.2s, color 0.2s;
      margin-bottom: 0.75rem;
    }
    .admin-tab:hover   { background: rgba(255,255,255,0.25); color: #fff; }
    .admin-tab.active  { background: #fff; color: #1a1a1a; font-weight: 600; }
    .admin-tab [data-lucide] { width: 15px; height: 15px; }

    /* =====================================================
       CONTENT
    ===================================================== */
    .admin-content { padding: 2rem; max-width: 1100px; margin: 0 auto; }
    .admin-panel   { display: none; }
    .admin-panel.active { display: block; }
    .panel-heading { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }

    /* =====================================================
       PENDING REGISTRATIONS
    ===================================================== */
    #pendingList { display: flex; flex-direction: column; gap: 1.5rem; }

    .applicant-card {
      background: white; border-radius: 12px; padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .applicant-card__header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .applicant-card__name { font-size: 1.1rem; font-weight: 600; }

    .badge--pending {
      background: #fff3cd; color: #856404;
      padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600;
    }

    .applicant-card__grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.75rem; margin-bottom: 1.25rem;
    }
    .detail-item__label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #888; margin-bottom: 2px; }
    .detail-item__value { font-size: 0.9rem; font-weight: 500; }

    .applicant-card__ids { display: flex; gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .id-photo-wrap__label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 0.4rem; }
    .id-photo { width: 200px; height: 130px; object-fit: cover; border-radius: 8px; border: 1px solid #e0e0e0; cursor: pointer; }
    .id-photo--missing { color: #aaa; font-size: 0.85rem; }

    .applicant-card__actions { display: flex; gap: 0.75rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1.1rem; border-radius: 8px; border: none;
      font-size: 0.9rem; font-weight: 500; cursor: pointer;
    }
    .btn--success { background: #198754; color: white; }
    .btn--success:hover { background: #157347; }
    .btn--danger  { background: #dc3545; color: white; }
    .btn--danger:hover  { background: #bb2d3b; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .applicant-card__feedback { font-size: 0.85rem; margin-top: 0.5rem; min-height: 1rem; }
    #emptyState { color: #888; }

    /* =====================================================
       USERS & ROLES
    ===================================================== */
    .roles-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;
    }

    .role-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }

    .role-filter-btn {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.4rem 0.9rem; border-radius: 999px;
      border: 1.5px solid #e0e0e0; background: white;
      font-size: 0.8rem; font-weight: 500; cursor: pointer; color: #555;
      transition: all 0.15s;
    }
    .role-filter-btn:hover { border-color: #999; color: #1a1a1a; }
    .role-filter-btn.active { background: #1a3a1a; color: white; border-color: #1a3a1a; }
    .role-filter-btn [data-lucide] { width: 13px; height: 13px; }

    .roles-search-wrap { position: relative; margin-bottom: 1.5rem; max-width: 400px; }
    .roles-search-wrap [data-lucide] {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      width: 16px; height: 16px; color: #aaa; pointer-events: none;
    }
    #rolesSearch {
      width: 100%; padding: 0.6rem 1rem 0.6rem 2.4rem;
      border: 1.5px solid #e0e0e0; border-radius: 10px;
      font-size: 0.875rem; outline: none; transition: border-color 0.15s; background: white;
    }
    #rolesSearch:focus { border-color: #1a3a1a; }

    /* User table — NO overflow:hidden so tooltips aren't clipped.
       Border-radius is handled by first/last-child on rows instead. */
    .users-table {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: visible;         /* ← key fix for tooltip clipping */
    }

    .user-row {
      display: grid;
      grid-template-columns: 2.5fr 1fr 1fr 0.8fr auto;
      align-items: center;
      padding: 0.9rem 1.25rem;
      border-bottom: 1px solid #f0f0f0;
      gap: 1rem;
      transition: background 0.1s;
      background: white;        /* needed since overflow:visible removes bg clipping */
    }
    /* Round the outer corners of first and last rows instead */
    .user-row:first-child { border-radius: 12px 12px 0 0; }
    .user-row:last-child  { border-bottom: none; border-radius: 0 0 12px 12px; }
    .user-row:only-child  { border-radius: 12px; }
    .user-row:hover { background: #fafafa; }

    .user-info { display: flex; align-items: center; gap: 0.75rem; min-width: 0; }

    .user-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.875rem; flex-shrink: 0; color: white;
    }
    .user-avatar--resident { background: #1a5c2e; }
    .user-avatar--officer  { background: #b45309; }
    .user-avatar--admin    { background: #9b1c1c; }

    .user-name {
      font-weight: 600; font-size: 0.9rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-since { font-size: 0.75rem; color: #999; }

    .role-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.8rem; font-weight: 600; padding: 0.25rem 0;
    }
    .role-badge [data-lucide] { width: 13px; height: 13px; }
    .role-badge--resident { color: #1a5c2e; }
    .role-badge--officer  { color: #b45309; }
    .role-badge--admin    { color: #9b1c1c; }

    .status-dot {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.8rem; color: #666;
    }
    .status-dot::before {
      content: ''; display: inline-block;
      width: 8px; height: 8px; border-radius: 50%; background: #ccc;
    }
    .status-dot--online::before  { background: #22c55e; }
    .status-dot--offline::before { background: #d1d5db; }
    .status-dot--recent::before  { background: #f59e0b; }

    .role-actions { display: flex; align-items: center; gap: 0.4rem; }

    .role-action-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2px solid #e0e0e0; background: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s; color: #bbb;
    }
    .role-action-btn [data-lucide] { width: 15px; height: 15px; }
    .role-action-btn:not(:disabled):hover { transform: scale(1.1); }

    .role-action-btn--resident { color: #1a5c2e; border-color: #1a5c2e; }
    .role-action-btn--officer  { color: #b45309; border-color: #b45309; }
    .role-action-btn--admin    { color: #9b1c1c; border-color: #9b1c1c; }

    .role-action-btn.current-role { border-width: 2.5px; }
    .role-action-btn.current-role--resident { background: #f0faf4; }
    .role-action-btn.current-role--officer  { background: #fffbeb; }
    .role-action-btn.current-role--admin    { background: #fff1f1; }

    .role-action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .users-empty {
      padding: 3rem; text-align: center; color: #aaa; font-size: 0.9rem;
      border-radius: 12px;
    }
    #rolesLoadingState {
      padding: 2rem; text-align: center; color: #888; font-size: 0.9rem;
    }

    /* "This is you" chip */
    .you-chip {
      display: inline-flex; align-items: center; gap: 3px;
      background: #e8f5ed; color: #1a5c2e;
      font-size: 0.7rem; font-weight: 600;
      padding: 2px 7px; border-radius: 999px;
      margin-left: 6px; vertical-align: middle;
    }
    .you-chip [data-lucide] { width: 11px; height: 11px; }

    /* Protected / superAdmin crown */
    .super-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: #fef9c3; color: #854d0e;
      font-size: 0.7rem; font-weight: 600;
      padding: 2px 7px; border-radius: 999px;
      margin-left: 4px; vertical-align: middle;
    }
    .super-badge [data-lucide] { width: 11px; height: 11px; }

    /* =====================================================
       JS TOOLTIP — positioned in body, never clips
    ===================================================== */
    #adminTooltip {
      position: fixed;
      z-index: 9999;
      background: #1a1a1a;
      color: white;
      font-size: 0.72rem;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    #adminTooltip.visible { opacity: 1; }

    /* =====================================================
       MODAL
    ===================================================== */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-backdrop.visible { opacity: 1; pointer-events: all; }

    .modal {
      background: white; border-radius: 16px; padding: 2rem;
      width: min(460px, 92vw); box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      transform: translateY(12px) scale(0.97);
      transition: transform 0.2s, opacity 0.2s; opacity: 0;
    }
    .modal-backdrop.visible .modal { transform: translateY(0) scale(1); opacity: 1; }

    .modal__icon {
      width: 48px; height: 48px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1rem;
    }
    .modal__icon--resident { background: #f0faf4; color: #1a5c2e; }
    .modal__icon--officer  { background: #fffbeb; color: #b45309; }
    .modal__icon--admin    { background: #fff1f1; color: #9b1c1c; }
    .modal__icon [data-lucide] { width: 22px; height: 22px; }

    .modal__title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .modal__body  { font-size: 0.9rem; color: #555; line-height: 1.6; margin-bottom: 1.25rem; }
    .modal__body strong { color: #1a1a1a; }

    .modal__confirm-wrap { display: none; flex-direction: column; gap: 0.4rem; margin-bottom: 1.25rem; }
    .modal__confirm-wrap.visible { display: flex; }
    .modal__confirm-label { font-size: 0.8rem; color: #666; font-weight: 500; }
    .modal__confirm-label span {
      font-family: monospace; background: #f4f6f9;
      padding: 1px 6px; border-radius: 4px; font-weight: 700; color: #9b1c1c;
    }
    .modal__confirm-input {
      padding: 0.6rem 0.9rem; border: 1.5px solid #e0e0e0;
      border-radius: 8px; font-size: 0.875rem; outline: none; transition: border-color 0.15s;
    }
    .modal__confirm-input:focus { border-color: #9b1c1c; }
    .modal__confirm-input.error { border-color: #dc3545; }

    .modal__actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
    .modal__btn { padding: 0.55rem 1.2rem; border-radius: 8px; border: none; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .modal__btn--cancel { background: #f4f6f9; color: #555; }
    .modal__btn--cancel:hover { background: #e8eaed; }
    .modal__btn--confirm { background: #1a5c2e; color: white; }
    .modal__btn--confirm:hover { background: #155227; }
    .modal__btn--confirm.admin-confirm { background: #9b1c1c; }
    .modal__btn--confirm.admin-confirm:hover { background: #7f1d1d; }
    .modal__btn--confirm:disabled { opacity: 0.4; cursor: not-allowed; }

    /* =====================================================
       TOAST
    ===================================================== */
    #toastContainer {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      display: flex; flex-direction: column; gap: 0.5rem; z-index: 2000;
    }
    .toast {
      display: flex; align-items: center; gap: 0.6rem;
      background: #1a1a1a; color: white;
      padding: 0.75rem 1.1rem; border-radius: 10px;
      font-size: 0.875rem; font-weight: 500;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      animation: toastIn 0.25s ease both;
    }
    .toast [data-lucide] { width: 16px; height: 16px; flex-shrink: 0; }
    .toast--success { background: #1a5c2e; }
    .toast--error   { background: #9b1c1c; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>

  <!-- TOP NAV -->
  <nav class="admin-topnav">
    <div class="admin-topnav__inner">
      <button class="admin-tab active" data-tab="pending" onclick="switchTab('pending')">
        <i data-lucide="clock"></i> Pending Registrations
        <span id="pendingBadgeCount" style="background:rgba(255,255,255,0.25);border-radius:999px;padding:0 6px;font-size:0.7rem;margin-left:2px;display:none"></span>
      </button>
      <button class="admin-tab" data-tab="roles" onclick="switchTab('roles')">
        <i data-lucide="users"></i> Users &amp; Roles
      </button>
    </div>
  </nav>

  <!-- CONTENT -->
  <div class="admin-content">

    <!-- PENDING TAB -->
    <div id="panel-pending" class="admin-panel active">
      <h1 class="panel-heading">Pending Registrations</h1>
      <div id="loadingState">Loading applications…</div>
      <p id="emptyState" hidden>No pending applications. ✅</p>
      <div id="pendingList"></div>
    </div>

    <!-- ROLES TAB -->
    <div id="panel-roles" class="admin-panel">
      <div class="roles-header">
        <h1 class="panel-heading" style="margin:0">Users &amp; Roles</h1>
      </div>

      <div class="role-filters">
        <button class="role-filter-btn active" data-role-filter="all" onclick="setRoleFilter('all', this)">
          <i data-lucide="users"></i> All Users
        </button>
        <button class="role-filter-btn" data-role-filter="resident" onclick="setRoleFilter('resident', this)">
          <i data-lucide="user"></i> Resident
        </button>
        <button class="role-filter-btn" data-role-filter="officer" onclick="setRoleFilter('officer', this)">
          <i data-lucide="shield"></i> Barangay Officer
        </button>
        <button class="role-filter-btn" data-role-filter="admin" onclick="setRoleFilter('admin', this)">
          <i data-lucide="settings"></i> Administrator
        </button>
      </div>

      <div class="roles-search-wrap">
        <i data-lucide="search"></i>
        <input type="text" id="rolesSearch" placeholder="Search by name or email…" oninput="filterUsers()" />
      </div>

      <div class="users-table" id="usersTable">
        <div id="rolesLoadingState">Loading users…</div>
      </div>
    </div>

  </div>

  <!-- JS TOOLTIP (appended to body — never clipped by any container) -->
  <div id="adminTooltip"></div>

  <!-- ROLE MODAL -->
  <div class="modal-backdrop" id="roleModal">
    <div class="modal">
      <div class="modal__icon" id="modalIcon">
        <i data-lucide="user" id="modalIconInner"></i>
      </div>
      <div class="modal__title" id="modalTitle">Assign Role</div>
      <div class="modal__body" id="modalBody"></div>
      <div class="modal__confirm-wrap" id="adminConfirmWrap">
        <label class="modal__confirm-label">Type <span>CONFIRM ADMIN</span> to proceed:</label>
        <input class="modal__confirm-input" id="adminConfirmInput" type="text"
          placeholder="CONFIRM ADMIN" oninput="onAdminConfirmInput()" />
      </div>
      <div class="modal__actions">
        <button class="modal__btn modal__btn--cancel" onclick="closeModal()">Cancel</button>
        <button class="modal__btn modal__btn--confirm" id="modalConfirmBtn" onclick="confirmRoleChange()">
          Assign Role
        </button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toastContainer"></div>

  <script>lucide.createIcons();</script>
  <script type="module" src="js/admin.js"></script>
  <script type="module" src="js/roles.js"></script>

</body>
</html>
